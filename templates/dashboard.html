<!DOCTYPE html>

<html>
<head>

    <title>AgroVision AI - Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

    <!-- HERO -->

    <div class="hero">

        <h1>📊 AgroVision Dashboard</h1>

        <p class="subtitle">
            Analytics & Prediction Statistics
        </p>

    </div>

    <!-- STATS -->

    <div class="features" style="margin-top:40px;">

        <div class="feature-card">

            <h3>🌿 Total Analyses</h3>

            <h2 style="color:#2e7d32;">
                {{ total_analyses }}
            </h2>

        </div>

        <div class="feature-card">

            <h3>✅ Healthy Plants</h3>

            <h2 style="color:#2e7d32;">
                {{ healthy_count }}
            </h2>

        </div>

        <div class="feature-card">

            <h3>⚠ Diseased Plants</h3>

            <h2 style="color:#d32f2f;">
                {{ diseased_count }}
            </h2>

        </div>

    </div>

    <!-- AVERAGE CONFIDENCE -->

    <div class="feature-card"
         style="
         margin-top:40px;
         padding:35px;">

        <h3>🎯 Average Confidence</h3>

        <h1 style="
            color:#2e7d32;
            margin-top:15px;">

            {{ average_confidence }}%

        </h1>

    </div>

    <!-- CONFIDENCE BAR -->

    <div style="margin-top:40px;">

        <h3 style="
            text-align:center;
            color:#2e7d32;
            margin-bottom:15px;">

            Average Model Confidence

        </h3>

        <div style="
            width:100%;
            height:30px;
            background:#e0e0e0;
            border-radius:20px;
            overflow:hidden;">

            <div style="
                width:{{ average_confidence }}%;
                height:100%;
                background:#2e7d32;">
            </div>

        </div>

    </div>

    <!-- PIE CHART -->

    <div class="feature-card"
         style="
         margin-top:50px;
         padding:35px;">

        <h2 style="
            color:#2e7d32;
            margin-bottom:25px;">

            🥧 Disease Distribution

        </h2>

        <div style="
            max-width:600px;
            margin:auto;">

            <canvas id="diseaseChart"></canvas>

        </div>

    </div>

    <!-- BUTTONS -->

    <div style="
        margin-top:50px;
        display:flex;
        gap:20px;
        justify-content:center;
        flex-wrap:wrap;">

        <a href="/"
           style="
           text-decoration:none;
           padding:15px 25px;
           background:#2e7d32;
           color:white;
           border-radius:10px;">

           🏠 Home

        </a>

        <a href="/history"
           style="
           text-decoration:none;
           padding:15px 25px;
           background:#1565c0;
           color:white;
           border-radius:10px;">

           📜 History

        </a>

    </div>

</div>

<script>

const chartLabels =
{{ chart_labels|tojson }};

const chartValues =
{{ chart_values|tojson }};

new Chart(
    document.getElementById(
        'diseaseChart'
    ),
    {
        type: 'pie',

        data: {

            labels: chartLabels,

            datasets: [{

                data: chartValues,

                backgroundColor: [

                    '#4CAF50',
                    '#F44336',
                    '#2196F3',
                    '#FF9800',
                    '#9C27B0',
                    '#009688',
                    '#795548',
                    '#3F51B5',
                    '#E91E63',
                    '#607D8B'

                ]

            }]
        },

        options: {

            responsive: true,

            plugins: {

                legend: {

                    position: 'bottom'

                },

                tooltip: {

                    callbacks: {

                        label: function(context) {

                            let total =
                                context.dataset.data.reduce(
                                    (a, b) => a + b,
                                    0
                                );

                            let value =
                                context.raw;

                            let percent =
                                (
                                    value / total * 100
                                ).toFixed(1);

                            return context.label +
                                   ": " +
                                   percent +
                                   "%";
                        }

                    }

                }

            }

        }

    }

);

</script>

</body>
</html>
